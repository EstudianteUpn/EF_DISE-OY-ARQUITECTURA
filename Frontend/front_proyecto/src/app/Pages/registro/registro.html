<div class="grid-bg"></div>

<div class="register-card">
  <span class="eyebrow">PAPELERÍA · EMPRESA COMERCIAL E INDUSTRIAL</span>
  <h1 class="brand">Keycam</h1>

  <div class="ruler" aria-hidden="true">
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick tick--major"></span>
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick"></span>
    <span class="tick tick--major"></span>
  </div>

  <p class="welcome">Crea tu cuenta para realizar pedidos</p>

  <p class="msg-error" *ngIf="mensajeError">{{ mensajeError }}</p>
  <p class="msg-exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>

  <div class="register-form">

    <div class="section-divider"><span>Datos personales</span></div>

    <div class="field">
      <label class="field-label" for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre"
             placeholder="Tu nombre"
             [(ngModel)]="nombre" required />
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label" for="apellidoPaterno">Apellido paterno</label>
        <input type="text" id="apellidoPaterno" name="apellidoPaterno"
               placeholder="Paterno"
               [(ngModel)]="apellidoPaterno" required />
      </div>
      <div class="field">
        <label class="field-label" for="apellidoMaterno">Apellido materno</label>
        <input type="text" id="apellidoMaterno" name="apellidoMaterno"
               placeholder="Materno"
               [(ngModel)]="apellidoMaterno" required />
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="dni">DNI</label>
      <input type="text" id="dni" name="dni"
             placeholder="12345678" maxlength="8"
             [(ngModel)]="dni" required />
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label" for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono"
              placeholder="987654321" maxlength="9" minlength="9"
              pattern="[0-9]{9}"
              [(ngModel)]="telefono" required />
      </div>
      <div class="field">
        <label class="field-label" for="tipoTelefono">Tipo</label>
        <select id="tipoTelefono" name="tipoTelefono"
                [(ngModel)]="tipoTelefono" required>
          <option value="Celular">Celular</option>
          <option value="WhatsApp">WhatsApp</option>
        </select>
      </div>
    </div>

    <div class="section-divider"><span>Credenciales de acceso</span></div>

    <div class="field">
      <label class="field-label" for="email">Correo</label>
      <input type="email" id="email" name="email"
             placeholder="tucorreo@ejemplo.com"
             [(ngModel)]="email" required />
    </div>

    <div class="field">
      <label class="field-label" for="password">Contraseña</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••"
             [(ngModel)]="password" required />
    </div>

    <button class="submit-btn"
            (click)="registrar()"
            [disabled]="cargando">
      {{ cargando ? 'Registrando...' : 'Crear cuenta' }}
    </button>

  </div>

  <p class="login-link">
    ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
  </p>
</div>
